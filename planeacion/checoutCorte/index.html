<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Producción y Listas de Corte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* Configuración de página para etiquetas */
        @page {
            size: 104mm 57.5mm;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            font-size: 9pt;
            background-color: white;
        }

        /* Salto de página para cada etiqueta */
        .label-container {
            width: 104mm;
            height: 57.5mm;
            box-sizing: border-box;
            padding: 3mm;
            padding-top: 35px;
            display: flex; /* Dividimos en Izquierda (Barcode) y Derecha (Info) */
            overflow: hidden;
            page-break-after: always;
            border: 0.5mm dashed #eee; /* Solo para visualización, se puede quitar */
        }

        /* Contenedor del código de barras vertical */
        .barcode-side {
            width: 12mm;
            display: flex;
            align-items: center;
            justify-content: center;
           
        }

      /*  .barcode-vertical {
            transform: rotate(-90deg); 
            transform-origin: center;
            border: 1px dashed #000;0
        } 
        */

        
        .info-side {
            flex: 1;
            padding-left: 2mm;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #000;
            margin-bottom: 2px;
            padding-bottom: 2px;
        }

        .logo {
            width: 50px;
            height: auto;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr ;
            gap: 1px;
            line-height: 1.1;
        }

        .full-width {
            grid-column: span 2;
        }

        .label-bold {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 8pt;

        }

        .footer-barcode {
           
            text-align: center;
        }

        #bcode-canvas {
            max-width: 100%;
            height: 6mm;
        }
   
        /* Corrección para evitar conflictos en vistas Bootstrap */
        .bootstrap-scope img, .bootstrap-scope svg { display: inline; }
      
    </style>
</head>
<body class="bg-light">

   

    
        
    

        <div class="container-fluid px-4 tab-content-all" id="porMaquinas">
            <nav class="navbar navbar-expand bg-secondary mb-4 rounded px-2">
                <input type="hidden" id="maquinaSeleccionada" value="todas">
                <div class="navbar-nav gap-2">
                    <button class="btn btn-light btn-sm" onclick="maquinaSelecionada('todas')">Todas las máquinas</button>
                    <button class="btn btn-light btn-sm" onclick="maquinaSelecionada('MCUT-1')">MCUT-1</button>
                    <button class="btn btn-light btn-sm" onclick="maquinaSelecionada('MCUT-10')">MCUT-2</button><!--falta  ponerla es igual que MCUT7-->
                    <button class="btn btn-light btn-sm" onclick="maquinaSelecionada('MCUT-10')">MCUT-3</button>
                    <button class="btn btn-light btn-sm" onclick="maquinaSelecionada('MCUT-4')">MCUT-4</button>
                     <button class="btn btn-light btn-sm" onclick="maquinaSelecionada('MCUT-5')">MCUT-5</button>
                    <button class="btn btn-light btn-sm" onclick="maquinaSelecionada('MCUT-6')">MCUT-6</button>
        
                    <button class="btn btn-light btn-sm" onclick="maquinaSelecionada('ESPECIALES')">Cables Especiales</button>
                </div>
            </nav>
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                    <h5 class="card-title mb-0 text-secondary"><i class="bi bi-list-task me-2"></i>Lista por máquina</h5>
                   
                    <span class="badge bg-primary rounded-pill" id="totalRecords2">0 registros</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th><th>Nº Parte</th><th>Cantidad</th><th>Work Order</th><th>Cons</th><th>Tipo</th><th>Calibre</th>
                                    <th>Color</th><th>Quitar</th>
                                </tr>
                            </thead>
                            <tbody id="resultTotal"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

   

    



    <script>
        
        window.onload = function() {
            document.getElementById('porMaquinas').display = 'block';
          pormaquina();
        }

        function maquinaSelecionada(maquina){
            document.getElementById('maquinaSeleccionada').value = maquina;
            pormaquina();
        }

       

        

      
 
        function pormaquina() {
            const maquina = document.getElementById('maquinaSeleccionada').value;
            document.getElementById('maquinaSeleccionada').value = maquina;

            fetch(`app/todas.php?maquina=${encodeURIComponent(maquina)}`)
            .then(response => response.json())
            .then(data => {
                
                if (data.status === "error") {
                    console.error("Error del servidor:", data.message);
                    alert("Error en el servidor: " + data.message);
                    return;
                }

                const tbody = document.getElementById('resultTotal');
                tbody.innerHTML = '';
                let totalRecords = 0;
                let id = 1;
                
                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${id}</td><td>${item.pn}</td><td>${item.Qty}</td><td>${item.wo}</td><td>${item.consumo}</td><td>${item.tipo}</td><td>${item.calibre}</td>
                        <td>${item.color}</td><td><input type="checkbox" id="quitar" name="quitar" onclick="quitar(${item.codigo})"></td>`;
                    tbody.appendChild(row);
                    totalRecords++;
                    id++;
                });
                document.getElementById('totalRecords2').textContent = totalRecords + ' registros';
            })
            .catch(err => console.error("Error en el procesamiento del Fetch:", err));
        }
        // Función para sumar minutos a una hora y devolver HH:mm
        function quitar(wo) {
            
            alert(wo);
           
            fetch(`app/quitar.php?codigo=${wo}`)
            .then(response => response.json())
            .then(data => {
                console.log(data);
               
               
            })
            .catch(err => console.error("Error en el procesamiento del Fetch:", err));
             pormaquina();
        }
    </script>
</body>
</html>
