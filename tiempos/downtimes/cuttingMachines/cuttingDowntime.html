<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paros Maquinas de corte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container mt-5">
      <h1>Agregar paro de maquina de corte</h1>
      <form method="POST" onsubmit="event.preventDefault(); sendinformation();">
        <div class="row">
                <div class="col-md-2 mb-3">
                <label for="dateRegistered" class="form-label">Fecha</label>
                <input type="date" class="form-control" id="dateRegistered" name="dateRegistered"  required>
                </div>
                <div class="col-md-2 mb-3">
                <label for="toolingCrimperName" class="form-label">Maquina de corte</label>
                <select class="form-select" id="toolingCrimperName" name="toolingCrimperName" required>
                    <option value="" disabled selected>Selecciona maquina ID</option>
                    <option value="M1">MCUT-1</option>
                    <option value="M2">MCUT-2</option>
                    <option value="M3">MCUT-3</option>
                    <option value="M4">MCUT-4</option>
                    <option value="M5">MCUT-5</option>
                    <option value="M6">MCUT-6</option>
                    <option value="M7">MCUT-7</option>

                        </select>   
                </div>
                <div class="col-md-2 mb-3">
                <label for="Hour time" class="form-label">Horarios</label>
                   <select class="form-select" id="hourTime" name="hourTime" required onchange="CheckDuplicate();">
                    <option value="" disabled selected>Selecciona un horario</option>
                    <option value="1">00:30:00-01:30:00</option>
                    <option value="2">01:30:00-02:30:00</option>
                    <option value="3">02:30:00-03:30:00</option>
                    <option value="4">03:30:00-04:30:00</option>
                    <option value="5">04:30:00-05:30:00</option>
                    <option value="6">05:30:00-06:30:00</option>
                     <option value="7">06:30:00-07:30:00</option>
                    <option value="8">07:30:00-08:30:00</option>
                    <option value="9">08:30:00-09:30:00</option>
                    <option value="10">09:30:00-10:30:00</option>
                    <option value="11">10:30:00-11:30:00</option>
                    <option value="12">11:30:00-12:30:00</option>
                    <option value="13">12:30:00-13:30:00</option>
                    <option value="14">13:30:00-14:30:00</option>
                    <option value="15">14:30:00-15:30:00</option>
                    <option value="16">15:30:00-16:30:00</option>
                    <option value="17">16:30:00-17:30:00</option>
                    <option value="18">17:30:00-18:30:00</option>    
                    <option value="19">18:30:00-19:30:00</option>
                    <option value="20">19:30:00-20:30:00</option>
                    <option value="21">20:30:00-21:30:00</option>
                    <option value="22">21:30:00-22:30:00</option>
                    <option value="23">22:30:00-23:30:00</option>
                    <option value="24">23:30:00-00:30:00</option>
                    </select>   
                </div>
                <div class="col-md-2 mb-3">
                    <label for="downtime" class="form-label">Tiempo Muerto</label>
                    <input type="number" class="form-control" id="downtime" name="downtime" min="0" step="1" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label for="reason" class="form-label">Razon</label>
                    <input type="text" class="form-control" id="reason" name="reason" maxlength="10" placeholder="Ej. K,J,G Separados por comas"  required>
                </div> 
                    <button type="submit" class="btn btn-primary">Agregar Tiempo Muerto</button>
                
            </div>      
            </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
<script>
    window.onload = function() {
        var today = new Date().toISOString().split('T')[0];
       
        document.getElementById("dateRegistered").value=yesterday;
        document.getElementById("dateRegistered").setAttribute('max', today);
       
    };

    async function CheckDuplicate(){
        var dateRegistered = document.getElementById("dateRegistered").value;
        var toolingCrimperName = document.getElementById("toolingCrimperName").value;
        var hourTime = document.getElementById("hourTime").value;

        let data = {
            dateRegistered: dateRegistered,
            toolingCrimperName: toolingCrimperName,
            hourTime: hourTime
        };

        let response = await fetch('check_duplicate.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({data: data})
        });
        let result = await response.json();
        if(result.status === 'duplicate'){
            alert(result.message);
            window.location.href = 'cuttingDowntime.html';
        }
        
    }
     async function sendinformation(){
        var dateRegistered = document.getElementById("dateRegistered").value;
        var toolingCrimperName = document.getElementById("toolingCrimperName").value;
        var hourTime = document.getElementById("hourTime").value;
        var downtime = document.getElementById("downtime").value;
        var reason = document.getElementById("reason").value;
       
        reason = reason.toUpperCase();
        let data = {
            dateRegistered: dateRegistered,
            toolingCrimperName: toolingCrimperName,
            hourTime: hourTime,
            downtime: downtime,
            reason: reason,
          
        };

        let response = await fetch('crimpers.php?' + new URLSearchParams(data), {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Access-Control-Allow-Origin': '*',
                'Access-Control-Allow-Methods': 'POST, GET, OPTIONS',
                'Access-Control-Allow-Headers': 'Content-Type',
                'Access-Control-Allow-Credentials': 'true'
                

            }
        });
        let result = await response.json();
        console.log(result);
        alert(result.message);
        window.location.href = 'cuttingDowntime.html';


        
    }
</script>
